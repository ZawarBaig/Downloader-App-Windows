name: Build MrBaig Downloader EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp pyinstaller Pillow

    - name: Download and Extract FFmpeg
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
        Copy-Item -Path "ffmpeg_extracted\*\bin\ffmpeg.exe" -Destination ".\ffmpeg.exe"

    - name: Verify icon file exists
      shell: powershell
      run: |
        if (Test-Path "icon.ico") {
          Write-Host "✅ icon.ico found — app will be built with custom icon."
        } else {
          Write-Host "⚠️ icon.ico NOT found — downloading a default icon."
          Invoke-WebRequest -Uri "https://www.iconarchive.com/download/i107137/martz90/circle/video.ico" -OutFile "icon.ico"
        }

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller `
          --noconsole `
          --onefile `
          --name "MrBaig-Downloader" `
          --icon="icon.ico" `
          --add-data "icon.ico;." `
          --add-binary "ffmpeg.exe;." `
          --version-file version.txt `
          downloader.py
      continue-on-error: false

    - name: Verify EXE was built
      shell: powershell
      run: |
        if (Test-Path "dist\MrBaig-Downloader.exe") {
          $size = (Get-Item "dist\MrBaig-Downloader.exe").Length / 1MB
          Write-Host "✅ EXE built successfully. Size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "❌ EXE not found! Build may have failed."
          exit 1
        }

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MrBaig-Downloader-Windows
        path: dist/MrBaig-Downloader.exe
         retention-days: 30
